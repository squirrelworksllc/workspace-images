name: CI (Lint Gate)

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-pr-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGES_JSON: .vscode/images.json

jobs:
  # Lints the core image (ubuntu-noble-core) to ensure it meets quality standards.
  validate-core:
    name: Lint – ubuntu-noble-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get core image config
        id: core-config
        shell: bash
        run: |
          CORE_CONFIG=$(jq -r '.images[] | select(.key == "ubuntu-noble-core")' "$IMAGES_JSON")
          echo "dockerfile=$(echo "$CORE_CONFIG" | jq -r '.dockerfile')" >> "$GITHUB_OUTPUT"
          echo "lintTarget=$(echo "$CORE_CONFIG" | jq -r '.lintTarget')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint – ubuntu-noble-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.core-config.outputs.dockerfile }}
          target: ${{ steps.core-config.outputs.lintTarget }}
          push: false

  # Generates a dynamic JSON matrix of all non-core images for linting.
  matrix-others:
    name: Build matrix (non-core)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix from images.json
        id: set
        shell: bash
        run: |
          set -euo pipefail
          MATRIX="$(jq -c '{include: [.images[] | select(.key != "ubuntu-noble-core") | {
            key: .key,
            dockerfile: .dockerfile,
            repo: .repo,
            lintTarget: .lintTarget
          }]}' "$IMAGES_JSON")"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  # Lints all non-core images in parallel using the matrix from the 'matrix-others' job.
  validate-others:
    name: Lint – ${{ matrix.key }}
    runs-on: ubuntu-latest
    needs: [matrix-others]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-others.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lint – ${{ matrix.key }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.lintTarget }}
          push: false
          tags: ${{ matrix.repo }}:ci-lint
          cache-from: type=gha,scope=ci-${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.key }}

  # Acts as the primary status check for branch protection on Pull Requests.
  lint-gate:
    name: lint / gate
    runs-on: ubuntu-latest
    needs: [validate-core, validate-others]
    if: always()
    steps:
      - name: Check linting results
        run: |
          if [[ "${{ needs.validate-core.result }}" != "success" || "${{ needs.validate-others.result }}" != "success" ]]; then
            echo "One or more lint checks failed. This will block the PR."
            exit 1
          fi
          echo "All lint checks passed."
