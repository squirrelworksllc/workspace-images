name: Publish (production)

on:
  push:
    branches:
      - main

concurrency:
  group: publish-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGES_JSON: .vscode/images.json

jobs:
  # Lints the core image (ubuntu-noble-core) to ensure it meets quality standards.
  validate-core:
    name: Lint prod – ubuntu-noble-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get core image config
        id: core-config
        shell: bash
        run: |
          CORE_CONFIG=$(jq -r '.images[] | select(.key == "ubuntu-noble-core")' "$IMAGES_JSON")
          echo "dockerfile=$(echo "$CORE_CONFIG" | jq -r '.dockerfile')" >> "$GITHUB_OUTPUT"
          echo "lintTarget=$(echo "$CORE_CONFIG" | jq -r '.lintTarget')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lint – ubuntu-noble-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.core-config.outputs.dockerfile }}
          target: ${{ steps.core-config.outputs.lintTarget }}
          push: false

  # Generates a dynamic JSON matrix of all non-core images from the images.json file.
  matrix-others:
    name: Build matrix (non-core)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix from images.json
        id: set
        shell: bash
        run: |
          set -euo pipefail

          # Get an array of JSON objects for non-core images
          mapfile -t IMAGES_ARRAY < <(jq -c '.images[] | select(.key != "ubuntu-noble-core")' "$IMAGES_JSON")

          JSON_ENTRIES=""
          for image_str in "${IMAGES_ARRAY[@]}"; do
            # Extract fields. Use jq's -r for raw strings.
            key=$(jq -r '.key' <<< "$image_str")
            dockerfile=$(jq -r '.dockerfile' <<< "$image_str")
            lintTarget=$(jq -r '.lintTarget' <<< "$image_str")
            repo=$(jq -r '.repo' <<< "$image_str")

            # Build architectures string with a fallback
            archs=$(jq -r '(if .architectures then .architectures else ["linux/amd64", "linux/arm64"] end) | join(",")' <<< "$image_str")

            # Build tags string in bash
            tags_array=$(jq '.prodTags' <<< "$image_str")
            tag_string=""
            if [[ "$tags_array" != "null" ]]; then
              mapfile -t tags < <(jq -r '.[]' <<< "$tags_array")
              for tag in "${tags[@]}"; do
                if [[ -z "$tag_string" ]]; then
                  tag_string="${repo}:${tag}"
                else
                  tag_string+=$(printf '\n%s:%s' "$repo" "$tag")
                fi
              done
            fi

            # Use jq to safely construct the JSON entry to handle escaping
            entry=$(jq -c -n \
              --arg key "$key" --arg dockerfile "$dockerfile" --arg lintTarget "$lintTarget" \
              --arg repo "$repo" --arg tags "$tag_string" --arg architectures "$archs" \
              '{key: $key, dockerfile: $dockerfile, lintTarget: $lintTarget, repo: $repo, tags: $tags, architectures: $architectures}')

            JSON_ENTRIES+="${entry},"
          done

          # Construct the final matrix JSON, removing the trailing comma
          MATRIX="{\"include\":[${JSON_ENTRIES%,}]}"
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  # Lints all non-core images in parallel using the matrix from the 'matrix-others' job.
  validate-others:
    name: Lint prod – ${{ matrix.key }}
    runs-on: ubuntu-latest
    needs: [matrix-others]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-others.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lint – ${{ matrix.key }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.lintTarget }}
          push: false
          tags: ${{ matrix.repo }}:ci-lint
          cache-from: type=gha,scope=pubprod-${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=pubprod-${{ matrix.key }}

  # Acts as the primary status check for branch protection. It runs after all linting jobs and succeeds only if they all pass.
  lint-gate:
    name: lint / gate
    runs-on: ubuntu-latest
    needs: [validate-core, validate-others]
    if: always()
    steps:
      - name: Check linting results
        run: |
          if [[ "${{ needs.validate-core.result }}" != "success" || "${{ needs.validate-others.result }}" != "success" ]]; then
            echo "One or more lint checks failed. This will block the PR."
            exit 1
          fi
          echo "All lint checks passed."

  # Builds and publishes the multi-arch core image after all lint checks have passed.
  publish-core:
    name: Publish prod – ubuntu-noble-core
    runs-on: ubuntu-latest
    needs: lint-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get core image config
        id: core-config
        shell: bash
        run: |
          CORE_CONFIG=$(jq -r '.images[] | select(.key == "ubuntu-noble-core")' "$IMAGES_JSON")
          echo "dockerfile=$(echo "$CORE_CONFIG" | jq -r '.dockerfile')" >> "$GITHUB_OUTPUT"
          echo "architectures=$(echo "$CORE_CONFIG" | jq -r '(if .architectures then .architectures else ["linux/amd64", "linux/arm64"] end) | join(",")')" >> "$GITHUB_OUTPUT"

          repo=$(echo "$CORE_CONFIG" | jq -r '.repo')
          tags_array=$(echo "$CORE_CONFIG" | jq '.prodTags')
          tag_string=""
          if [[ "$tags_array" != "null" ]]; then
            mapfile -t tags < <(jq -r '.[]' <<< "$tags_array")
            for tag in "${tags[@]}"; do
              if [[ -z "$tag_string" ]]; then
                tag_string="${repo}:${tag}"
              else
                tag_string+=$(printf '\n%s:%s' "$repo" "$tag")
              fi
            done
          fi

          {
            echo 'tags<<EOF'
            echo "$tag_string"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push – ubuntu-noble-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.core-config.outputs.dockerfile }}
          platforms: ${{ steps.core-config.outputs.architectures }}
          push: true
          tags: ${{ steps.core-config.outputs.tags }}

  # Builds and publishes all non-core images in parallel. Individual build failures are allowed and will not stop the workflow.
  publish-others:
    name: Publish prod – ${{ matrix.key }}
    runs-on: ubuntu-latest
    needs: [publish-core, matrix-others]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-others.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push – ${{ matrix.key }}
        id: push
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.architectures }}
          push: true
          tags: ${{ matrix.tags }}
          cache-from: type=gha,scope=pubprod-${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=pubprod-${{ matrix.key }}

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "Image: ${{ matrix.repo }}"
          echo "Push outcome: ${{ steps.push.outcome || 'skipped' }}"

      - name: Mark this image failed (but don't block others)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          PUSH_OUTCOME="${{ steps.push.outcome }}"

          if [ "$PUSH_OUTCOME" != "success" ]; then
            echo "Build/push failed (or was skipped unexpectedly) for ${{ matrix.repo }} — marking this leg failed."
            exit 1
          fi

          echo "OK: ${{ matrix.repo }} published successfully."
