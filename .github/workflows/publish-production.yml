name: Publish (production)

on:
  push:
    branches:
      - main

concurrency:
  group: publish-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGES_JSON: .vscode/images.json

jobs:
  publish-core:
    name: Publish prod – ubuntu-noble-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get core image config
        id: core-config
        shell: bash
        run: |
          CORE_CONFIG=$(jq -r '.images[] | select(.key == "ubuntu-noble-core")' "$IMAGES_JSON")
          echo "dockerfile=$(echo "$CORE_CONFIG" | jq -r '.dockerfile')" >> "$GITHUB_OUTPUT"
          echo "repo=$(echo "$CORE_CONFIG" | jq -r '.repo')" >> "$GITHUB_OUTPUT"
          echo "prodTag=$(echo "$CORE_CONFIG" | jq -r '.prodTag')" >> "$GITHUB_OUTPUT"
          echo "lintTarget=$(echo "$CORE_CONFIG" | jq -r '.lintTarget')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lint – ubuntu-noble-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.core-config.outputs.dockerfile }}
          target: ${{ steps.core-config.outputs.lintTarget }}
          push: false

      - name: Build & push – ubuntu-noble-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.core-config.outputs.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.core-config.outputs.repo }}:${{ steps.core-config.outputs.prodTag }}

  matrix-others:
    name: Build matrix (non-core)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate matrix from images.json
        id: set
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$IMAGES_JSON" ]; then
            echo "Missing $IMAGES_JSON"
            exit 1
          fi

          MATRIX="$(jq -c '{include: [.images[] | select(.key != "ubuntu-noble-core") | {
            key: .key,
            dockerfile: .dockerfile,
            repo: .repo,
            prodTag: .prodTag,
            lintTarget: .lintTarget
          }]}' "$IMAGES_JSON")"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  publish-others:
    name: Publish prod – ${{ matrix.key }}
    runs-on: ubuntu-latest
    needs: [publish-core, matrix-others]

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-others.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Lint – ${{ matrix.key }}
        id: lint
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.lintTarget }}
          push: false
          tags: ${{ matrix.repo }}:ci-lint
          cache-from: type=gha,scope=pubprod-${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=pubprod-${{ matrix.key }}

      - name: Build & push – ${{ matrix.key }}
        id: push
        if: steps.lint.outcome == 'success'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.repo }}:${{ matrix.prodTag }}
          cache-from: type=gha,scope=pubprod-${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=pubprod-${{ matrix.key }}

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "Image: ${{ matrix.repo }}"
          echo "Lint outcome: ${{ steps.lint.outcome }}"
          echo "Push outcome: ${{ steps.push.outcome || 'skipped' }}"

      - name: Mark this image failed (but don't block others)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          LINT_OUTCOME="${{ steps.lint.outcome }}"
          PUSH_OUTCOME="${{ steps.push.outcome }}"

          if [ "$LINT_OUTCOME" != "success" ]; then
            echo "Lint failed for ${{ matrix.repo }} — marking this leg failed."
            exit 1
          fi

          if [ "$PUSH_OUTCOME" != "success" ]; then
            echo "Build/push failed (or was skipped unexpectedly) for ${{ matrix.repo }} — marking this leg failed."
            exit 1
          fi

          echo "OK: ${{ matrix.repo }} published successfully."
